<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <button class="chat-launcher" id="chatLauncher">
        <i class="fas fa-comment-dots"></i>
    </button>

    <div class="chat-container hidden" id="chatContainer">
        <div class="chat-header">
            <div class="header-info">
                <h3>AI Assistant</h3>
                <span class="status-indicator"></span><span class="status-text">Online</span>
            </div>
            <button class="close-chat" id="closeChatBtn">&times;</button>
        </div>
        
        <div class="chat-messages" id="chatbox">
            <!-- Initial greeting -->
            <div class="message bot-message">
                <div class="bubble">
                    Hello! I'm your AI assistant. How can I help you today?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <form id="chatForm">
                <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
                <button type="submit" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <!-- Contact Support Modal for standard fallback -->
    <div id="contactModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Contact Human Support</h2>
            <p>Please enter your details and our team will get back to you.</p>
            <input type="email" placeholder="Email Address" class="modal-input">
            <textarea placeholder="How can we help?" class="modal-input"></textarea>
            <button class="btn-primary" onclick="closeModal()">Send Message</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
